<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Safe Rwanda Emergency System</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0;background:#0A0E1A;">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const COLORS = {
  primary: "#C8102E",
  primaryDark: "#9B0C23",
  primaryLight: "#FF1A45",
  secondary: "#006A4E",
  secondaryDark: "#004D38",
  accent: "#FFD700",
  bg: "#0A0E1A",
  bgCard: "#111827",
  bgPanel: "#1a2236",
  bgInput: "#0d1525",
  border: "rgba(255,255,255,0.08)",
  borderStrong: "rgba(255,255,255,0.15)",
  text: "#F1F5F9",
  textMuted: "#94A3B8",
  textDim: "#64748B",
  success: "#10B981",
  warning: "#F59E0B",
  danger: "#EF4444",
  info: "#3B82F6",
};

const CSS = `
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Sora',sans-serif;background:${COLORS.bg};color:${COLORS.text};min-height:100vh;overflow-x:hidden}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:${COLORS.bgCard}}::-webkit-scrollbar-thumb{background:${COLORS.primary};border-radius:2px}
  input,select,textarea{font-family:'Sora',sans-serif;background:${COLORS.bgInput};border:1px solid ${COLORS.border};color:${COLORS.text};padding:10px 14px;border-radius:8px;width:100%;font-size:14px;transition:border-color .2s,box-shadow .2s;outline:none}
  input:focus,select:focus,textarea:focus{border-color:${COLORS.primary};box-shadow:0 0 0 3px rgba(200,16,46,0.15)}
  select option{background:${COLORS.bgCard}}
  button{font-family:'Sora',sans-serif;cursor:pointer;border:none;transition:all .2s}
  .btn-primary{background:${COLORS.primary};color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;letter-spacing:.3px}
  .btn-primary:hover{background:${COLORS.primaryLight};transform:translateY(-1px)}
  .btn-secondary{background:transparent;color:${COLORS.text};padding:10px 20px;border-radius:8px;font-size:14px;border:1px solid ${COLORS.border}}
  .btn-secondary:hover{background:rgba(255,255,255,0.05);border-color:${COLORS.borderStrong}}
  .btn-success{background:${COLORS.success};color:#fff;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600}
  .btn-danger{background:${COLORS.danger};color:#fff;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600}
  .btn-warning{background:${COLORS.warning};color:#000;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600}
  .btn-info{background:${COLORS.info};color:#fff;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600}
  .card{background:${COLORS.bgCard};border:1px solid ${COLORS.border};border-radius:16px;padding:24px}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
  .badge-critical{background:rgba(239,68,68,.18);color:#FCA5A5}
  .badge-high{background:rgba(245,158,11,.18);color:#FCD34D}
  .badge-medium{background:rgba(59,130,246,.18);color:#93C5FD}
  .badge-low{background:rgba(16,185,129,.18);color:#6EE7B7}
  .badge-open{background:rgba(59,130,246,.18);color:#93C5FD}
  .badge-closed{background:rgba(16,185,129,.18);color:#6EE7B7}
  .badge-pending{background:rgba(245,158,11,.18);color:#FCD34D}
  .badge-progress{background:rgba(167,139,250,.18);color:#C4B5FD}
  .sidebar-link{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;color:${COLORS.textMuted};font-size:13.5px;font-weight:500;cursor:pointer;transition:all .2s;border:none;background:none;width:100%;text-align:left}
  .sidebar-link:hover,.sidebar-link.active{background:rgba(200,16,46,.12);color:${COLORS.primary}}
  .sidebar-link.active{border-left:3px solid ${COLORS.primary}}
  .pulse{animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .slide-in{animation:slideIn .3s ease}
  @keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .ring-animation{animation:ring 1.5s ease-in-out infinite}
  @keyframes ring{0%{box-shadow:0 0 0 0 rgba(200,16,46,.7)}70%{box-shadow:0 0 0 15px transparent}100%{box-shadow:0 0 0 0 transparent}}
  .stat-card{background:${COLORS.bgPanel};border:1px solid ${COLORS.border};border-radius:14px;padding:20px;transition:transform .2s,border-color .2s}
  .stat-card:hover{transform:translateY(-2px);border-color:${COLORS.borderStrong}}
  .map-placeholder{background:linear-gradient(135deg,#0f1b2e 0%,#162035 50%,#0f1b2e 100%);border-radius:12px;position:relative;overflow:hidden;min-height:300px;display:flex;align-items:center;justify-content:center}
  .map-dot{position:absolute;width:12px;height:12px;border-radius:50%;background:${COLORS.primary};box-shadow:0 0 12px ${COLORS.primary}}

  .notification-item{display:flex;align-items:flex-start;gap:12px;padding:14px;border-radius:10px;background:${COLORS.bgPanel};border:1px solid ${COLORS.border};margin-bottom:8px;transition:border-color .2s}
  .notification-item:hover{border-color:${COLORS.primary}}
  .notification-item.unread{border-left:3px solid ${COLORS.primary}}
  .alert-banner{background:linear-gradient(90deg,${COLORS.primaryDark},rgba(200,16,46,.6));border:1px solid ${COLORS.primary};border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .progress-bar{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;border-radius:3px;transition:width .5s ease}
  .evidence-thumb{width:80px;height:80px;border-radius:8px;background:${COLORS.bgPanel};border:1px solid ${COLORS.border};display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s}
  .evidence-thumb:hover{border-color:${COLORS.primary}}
  .step-indicator{display:flex;align-items:center;gap:0}
  .step{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;transition:all .3s}
  .step.active{background:rgba(200,16,46,.15);color:${COLORS.primary};border:1px solid rgba(200,16,46,.3)}
  .step.done{background:rgba(16,185,129,.12);color:${COLORS.success}}
  .step.inactive{color:${COLORS.textDim}}
  .step-connector{width:30px;height:2px;background:${COLORS.border}}
  .step-connector.done{background:${COLORS.success}}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;padding:10px 14px;font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:${COLORS.textDim};border-bottom:1px solid ${COLORS.border}}
  td{padding:12px 14px;font-size:13.5px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
  tr:hover td{background:rgba(255,255,255,.02)}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:${COLORS.bgCard};border:1px solid ${COLORS.borderStrong};border-radius:20px;padding:28px;max-width:520px;width:100%;max-height:80vh;overflow-y:auto}
  .nav-tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;color:${COLORS.textMuted};background:none;border:1px solid transparent}
  .nav-tab:hover{color:${COLORS.text};border-color:${COLORS.border}}
  .nav-tab.active{background:${COLORS.primary};color:#fff;border-color:transparent}
  .form-group{margin-bottom:18px}
  .form-label{display:block;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:${COLORS.textMuted};margin-bottom:8px}
  .form-hint{font-size:11px;color:${COLORS.textDim};margin-top:5px}
  .chart-bar{background:rgba(200,16,46,.6);border-radius:4px 4px 0 0;transition:all .3s;min-width:30px}
  .chart-bar:hover{background:${COLORS.primary}}
  .logo-text{font-weight:700;font-size:20px;letter-spacing:-0.5px}
  .logo-text span{color:${COLORS.primary}}
  .glow-text{text-shadow:0 0 20px rgba(200,16,46,.5)}
`;

  { id: "RPT-2401", type: "Theft", description: "Motorcycle theft at Kimironko Market. Two suspects on a red motorcycle.", location: "Kimironko, Kigali", lat: -1.9441, lng: 30.1219, date: "2025-05-20 08:42", level: "High", status: "In Progress", reporter: "Jean Baptiste M.", evidence: ["photo1.jpg"], station: "Remera Police Station", assignedOfficer: "Sgt. Uwimana K.", updates: [{ time: "08:45", msg: "Report received and dispatched" }, { time: "09:10", msg: "Officers en route to location" }, { time: "09:45", msg: "Scene investigated, suspects identified" }] },
  { id: "RPT-2402", type: "Road Accident", description: "Serious road accident on KK15 Ave. Multiple casualties. Ambulance needed urgently.", location: "Kacyiru, Kigali", lat: -1.9506, lng: 30.0897, date: "2025-05-20 07:15", level: "Critical", status: "Resolved", reporter: "Marie Claire U.", evidence: ["video1.mp4", "photo2.jpg"], station: "Kacyiru Police Station", assignedOfficer: "Insp. Nkurunziza A.", updates: [{ time: "07:18", msg: "Emergency alert sent to CHUK Hospital" }, { time: "07:25", msg: "Ambulance dispatched" }, { time: "07:50", msg: "Casualties transported to hospital" }, { time: "09:00", msg: "Case resolved" }] },

];

const HOSPITALS = ["CHUK Hospital", "King Faisal Hospital", "Kibagabaga Hospital", "Kacyiru Hospital"];
const OFFICERS = ["Sgt. Uwimana K.", "Insp. Nkurunziza A.", "Sgt. Habimana D.", "Insp. Mutesi G.", "Cpl. Niyonzima P."];

// ── icons ───────────────────────────────────────────────
const Icon = ({ name, size = 16, color }) => (
  <i className={`ti ti-${name}`} style={{ fontSize: size, color, lineHeight: 1 }} aria-hidden="true" />
);

// ── level badge ─────────────────────────────────────────
const LevelBadge = ({ level }) => {
  const map = { Critical: "critical", High: "high", Medium: "medium", Low: "low" };
  return <span className={`badge badge-${map[level] || "low"}`}><Icon name={level === "Critical" ? "flame" : level === "High" ? "alert-triangle" : level === "Medium" ? "alert-circle" : "info-circle"} size={11} />{level}</span>;
};

const StatusBadge = ({ status }) => {
  const map = { Open: "open", "In Progress": "progress", Resolved: "closed", Pending: "pending", Rejected: "danger" };
  const cls = map[status] || "open";
  return <span className={`badge badge-${cls}`}>{status}</span>;
};

// ── TOPBAR ───────────────────────────────────────────────
const TopBar = ({ page, setPage, user, notifications, setShowNotif }) => (
  <div style={{ background: COLORS.bgCard, borderBottom: `1px solid ${COLORS.border}`, padding: "0 24px", height: 60, display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 100 }}>
    <div style={{ display: "flex", alignItems: "center", gap: 16 }}>

          <button className="btn-secondary" style={{ padding: "6px 14px", fontSize: 13 }} onClick={() => setPage("login")}>Log In</button>
          <button className="btn-primary" style={{ padding: "6px 14px", fontSize: 13 }} onClick={() => setPage("register")}>Register</button>
        </div>

);

// ── HOME PAGE ────────────────────────────────────────────
const HomePage = ({ setPage }) => {

        <div style={{ position: "absolute", inset: 0, backgroundImage: "radial-gradient(circle at 20% 80%,rgba(0,106,78,.1) 0%,transparent 50%), radial-gradient(circle at 80% 20%,rgba(200,16,46,.08) 0%,transparent 50%)" }} />
        <div className="ring-animation" style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "rgba(200,16,46,.12)", border: `1px solid rgba(200,16,46,.3)`, borderRadius: 20, padding: "6px 14px", marginBottom: 24 }}>
          <span style={{ width: 8, height: 8, borderRadius: "50%", background: COLORS.primary, display: "inline-block" }} className="pulse" />

        </h1>
        <p style={{ fontSize: 17, color: COLORS.textMuted, maxWidth: 560, margin: "0 auto 36px", lineHeight: 1.7 }}>Rwanda's official crime and emergency reporting platform. Submit reports instantly, track case progress, and connect with emergency services in real-time.</p>

          </button>
        </div>
        {/* SOS Button */}
        <div style={{ marginTop: 40 }}>
          <div style={{ fontSize: 12, color: COLORS.textDim, marginBottom: 12, textTransform: "uppercase", letterSpacing: 1 }}>Life-threatening emergency?</div>
          <button style={{ width: 90, height: 90, borderRadius: "50%", background: `radial-gradient(circle,${COLORS.primary},${COLORS.primaryDark})`, border: `3px solid rgba(200,16,46,.4)`, color: "#fff", fontSize: 18, fontWeight: 800, letterSpacing: 2, cursor: "pointer", boxShadow: `0 0 30px rgba(200,16,46,.5)`, animation: "ring 2s infinite" }} onClick={() => { alert("🚨 SOS ALERT SENT\nEmergency services have been notified. Help is on the way.\n\nRwanda Emergency: 112 | Police: 113 | Ambulance: 912"); }}>SOS</button>

// ── LOGIN PAGE ───────────────────────────────────────────
const LoginPage = ({ setPage, setUser }) => {
  const [form, setForm] = useState({ email: "", password: "", role: "citizen" });
  const [error, setError] = useState("");
  const USERS = {
    "admin@saferwanda.rw": { name: "Admin User", role: "Admin", pw: "admin123" },
    "police@rdf.gov.rw": { name: "Insp. Uwimana", role: "Police", pw: "police123" },
    "hospital@chuk.rw": { name: "Dr. Mukamana", role: "Hospital", pw: "hospital123" },
    "citizen@gmail.com": { name: "Jean Baptiste", role: "Citizen", pw: "user123" },
  };
  const handle = () => {
    const u = USERS[form.email];

  const demos = [{ label: "Admin", email: "admin@saferwanda.rw", pw: "admin123" }, { label: "Police", email: "police@rdf.gov.rw", pw: "police123" }, { label: "Hospital", email: "hospital@chuk.rw", pw: "hospital123" }, { label: "Citizen", email: "citizen@gmail.com", pw: "user123" }];
  return (
    <div style={{ minHeight: "calc(100vh - 60px)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24, background: "radial-gradient(ellipse at 50% 50%,rgba(200,16,46,.08) 0%,transparent 70%)" }} className="slide-in">
      <div style={{ width: "100%", maxWidth: 440 }}>
        <div style={{ textAlign: "center", marginBottom: 36 }}>
          <div style={{ width: 60, height: 60, borderRadius: 16, background: COLORS.primary, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px" }}>
            <Icon name="shield-lock" size={28} color="#fff" />
          </div>
          <h1 style={{ fontSize: 26, fontWeight: 700, marginBottom: 8 }}>Secure Sign In</h1>
          <p style={{ color: COLORS.textMuted, fontSize: 14 }}>SafeRwanda Emergency Reporting System</p>
        </div>
        <div className="card">
          {error && <div style={{ background: "rgba(239,68,68,.1)", border: `1px solid rgba(239,68,68,.3)`, borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 13, color: "#FCA5A5" }}>{error}</div>}
          <div className="form-group">
            <label className="form-label">Email Address</label>
            <input type="email" placeholder="your@email.com" value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} />
          </div>
          <div className="form-group">
            <label className="form-label">Password</label>
            <input type="password" placeholder="••••••••" value={form.password} onChange={e => setForm({ ...form, password: e.target.value })} />
          </div>
          <button className="btn-primary" style={{ width: "100%", padding: "12px", fontSize: 15, borderRadius: 10, marginTop: 4 }} onClick={handle}>Sign In</button>
          <div style={{ textAlign: "center", marginTop: 16, fontSize: 13, color: COLORS.textMuted }}>
            Don't have an account? <span style={{ color: COLORS.primary, cursor: "pointer", fontWeight: 600 }} onClick={() => setPage("register")}>Register</span>
          </div>
        </div>
        <div style={{ marginTop: 20 }}>
          <div style={{ fontSize: 11, color: COLORS.textDim, textAlign: "center", marginBottom: 12, textTransform: "uppercase", letterSpacing: 1 }}>Demo Accounts</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            {demos.map(d => (
              <button key={d.label} onClick={() => setForm({ email: d.email, password: d.pw })} style={{ background: COLORS.bgPanel, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: "10px", fontSize: 12, color: COLORS.textMuted, cursor: "pointer", transition: "all .2s" }}
                onMouseEnter={e => e.currentTarget.style.borderColor = COLORS.primary}
                onMouseLeave={e => e.currentTarget.style.borderColor = COLORS.border}>
                <div style={{ fontWeight: 600, color: COLORS.text, marginBottom: 2 }}>{d.label}</div>
                <div style={{ fontSize: 10 }}>{d.email}</div>

        </div>
      </div>

// ── REGISTER PAGE ────────────────────────────────────────
const RegisterPage = ({ setPage }) => {
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({ name: "", email: "", phone: "", national_id: "", password: "", confirm: "", district: "", agree: false });
  const [done, setDone] = useState(false);
  const upd = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const submit = () => {
    if (form.password !== form.confirm) { alert("Passwords don't match"); return; }
    setDone(true);
  };
  if (done) return (
    <div style={{ minHeight: "calc(100vh-60px)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }} className="slide-in">
      <div style={{ textAlign: "center", maxWidth: 400 }}>
        <div style={{ width: 72, height: 72, borderRadius: "50%", background: "rgba(16,185,129,.15)", border: `2px solid ${COLORS.success}`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px" }}>
          <Icon name="check" size={36} color={COLORS.success} />
        </div>
        <h2 style={{ fontSize: 22, fontWeight: 700, marginBottom: 12 }}>Account Created!</h2>
        <p style={{ color: COLORS.textMuted, fontSize: 14, marginBottom: 24 }}>Welcome to SafeRwanda. Your account has been verified and is ready to use.</p>
        <button className="btn-primary" style={{ padding: "12px 32px", borderRadius: 10 }} onClick={() => setPage("login")}>Sign In Now</button>

    <div style={{ minHeight: "calc(100vh - 60px)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }} className="slide-in">

        <h2 style={{ fontSize: 24, fontWeight: 700, textAlign: "center", marginBottom: 6 }}>Create Account</h2>

        <div className="card">
          {step === 1 ? (
            <>
              <div className="form-group"><label className="form-label">Full Name</label><input placeholder="Jean Baptiste Nkurunziza" value={form.name} onChange={e => upd("name", e.target.value)} /></div>
              <div className="form-group"><label className="form-label">Email Address</label><input type="email" placeholder="jean@example.com" value={form.email} onChange={e => upd("email", e.target.value)} /></div>
              <div className="form-group"><label className="form-label">Phone Number</label><input placeholder="+250 7XX XXX XXX" value={form.phone} onChange={e => upd("phone", e.target.value)} /></div>
              <div className="form-group"><label className="form-label">National ID</label><input placeholder="1 XXXX X XXXXXXX X XX" value={form.national_id} onChange={e => upd("national_id", e.target.value)} /><div className="form-hint">Your National ID is required for account verification</div></div>
              <button className="btn-primary" style={{ width: "100%", padding: 12, borderRadius: 10 }} onClick={() => setStep(2)}>Continue</button>
            </>
          ) : (
            <>
              <div className="form-group"><label className="form-label">District</label>
                <select value={form.district} onChange={e => upd("district", e.target.value)}>

                  {["Nyarugenge", "Gasabo", "Kicukiro", "Bugesera", "Gatsibo", "Kayonza", "Kirehe", "Ngoma", "Nyagatare", "Rwamagana"].map(d => <option key={d}>{d}</option>)}
                </select>
              </div>
              <div className="form-group"><label className="form-label">Password</label><input type="password" placeholder="Min. 8 characters" value={form.password} onChange={e => upd("password", e.target.value)} /></div>
              <div className="form-group"><label className="form-label">Confirm Password</label><input type="password" placeholder="Repeat password" value={form.confirm} onChange={e => upd("confirm", e.target.value)} /></div>
              <div style={{ background: "rgba(245,158,11,.08)", border: `1px solid rgba(245,158,11,.2)`, borderRadius: 8, padding: "12px 14px", marginBottom: 18, fontSize: 12, color: COLORS.textMuted, lineHeight: 1.6 }}>
                <strong style={{ color: COLORS.warning }}>⚠️ Important:</strong> Submitting false or misleading reports is a criminal offense under Rwandan law. By registering, you agree to use this platform responsibly.
              </div>
              <label style={{ display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 18, cursor: "pointer", fontSize: 13, color: COLORS.textMuted }}>
                <input type="checkbox" checked={form.agree} onChange={e => upd("agree", e.target.checked)} style={{ width: 16, height: 16, marginTop: 2 }} />
                I agree to the Terms of Service and acknowledge that false reporting is a punishable offense

              <div style={{ display: "flex", gap: 10 }}>

// ── REPORT FORM ──────────────────────────────────────────
const ReportPage = ({ setPage, reports, setReports, user }) => {
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({ type: "", description: "", location: "", level: "", date: new Date().toISOString().slice(0, 16), lat: -1.9441, lng: 30.0619, evidence: [] });
  const [submitted, setSubmitted] = useState(null);
  const upd = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const addEvidence = (type) => setForm(p => ({ ...p, evidence: [...p.evidence, { type, name: `${type}_${Date.now()}.${type === "Photo" ? "jpg" : type === "Video" ? "mp4" : "mp3"}` }] }));
  const submit = () => {
    const id = `RPT-${2400 + reports.length + 7}`;
    const newReport = { id, ...form, status: "Open", reporter: user?.name || "Anonymous", station: STATIONS[Math.floor(Math.random() * STATIONS.length)], assignedOfficer: null, updates: [{ time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }), msg: "Report received and logged in system" }] };
    setReports(p => [newReport, ...p]);
    setSubmitted(id);
  };
  if (submitted) return (
    <div style={{ minHeight: "calc(100vh-60px)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }} className="slide-in">
      <div className="card" style={{ maxWidth: 480, width: "100%", textAlign: "center" }}>
        <div style={{ width: 70, height: 70, borderRadius: "50%", background: "rgba(16,185,129,.15)", border: `2px solid ${COLORS.success}`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px" }}>
          <Icon name="check" size={34} color={COLORS.success} />
        </div>
        <h2 style={{ marginBottom: 8 }}>Report Submitted</h2>
        <p style={{ color: COLORS.textMuted, fontSize: 14, marginBottom: 20 }}>Your emergency report has been logged and dispatched to the nearest police station.</p>
        <div style={{ background: COLORS.bgPanel, borderRadius: 10, padding: 16, marginBottom: 24 }}>
          <div style={{ fontSize: 11, color: COLORS.textDim, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Report ID</div>
          <div style={{ fontSize: 26, fontWeight: 800, color: COLORS.primary, letterSpacing: 1, fontFamily: "'JetBrains Mono',monospace" }}>{submitted}</div>
        </div>
        {form.level === "Critical" && <div className="alert-banner" style={{ marginBottom: 20 }}><Icon name="bell-ringing" size={18} color="#fff" /><span style={{ fontSize: 13 }}>🚨 Emergency alert sent to nearest hospital and police station!</span></div>}
        <div style={{ display: "flex", gap: 10 }}>
          <button className="btn-primary" style={{ flex: 1, padding: 12, borderRadius: 10 }} onClick={() => setPage("track")}>Track Case</button>
          <button className="btn-secondary" style={{ flex: 1, padding: 12, borderRadius: 10 }} onClick={() => { setSubmitted(null); setStep(1); setForm({ type: "", description: "", location: "", level: "", date: new Date().toISOString().slice(0, 16), lat: -1.9441, lng: 30.0619, evidence: [] }); }}>New Report</button>
        </div>
      </div>
    </div>
  );
  const steps = ["Incident Details", "Location & Time", "Evidence Upload", "Review & Submit"];
  return (
    <div style={{ maxWidth: 660, margin: "0 auto", padding: "30px 24px" }} className="slide-in">
      <div style={{ marginBottom: 28 }}>
        <h1 style={{ fontSize: 24, fontWeight: 700, marginBottom: 6 }}>Report Emergency</h1>
        <p style={{ color: COLORS.textMuted, fontSize: 14 }}>Fill in the details accurately. Your report will be sent to emergency services immediately.</p>
      </div>
      {/* Step indicator */}
      <div style={{ display: "flex", alignItems: "center", marginBottom: 32, overflowX: "auto" }}>
        {steps.map((s, i) => (
          <div key={s} style={{ display: "flex", alignItems: "center" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, cursor: i < step ? "pointer" : "default" }} onClick={() => i < step && setStep(i + 1)}>
              <div style={{ width: 28, height: 28, borderRadius: "50%", background: step > i + 1 ? COLORS.success : step === i + 1 ? COLORS.primary : COLORS.bgPanel, border: `2px solid ${step > i + 1 ? COLORS.success : step === i + 1 ? COLORS.primary : COLORS.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, flexShrink: 0, transition: "all .3s" }}>
                {step > i + 1 ? <Icon name="check" size={14} color="#fff" /> : i + 1}
              </div>
              <span style={{ fontSize: 12, fontWeight: step === i + 1 ? 600 : 400, color: step === i + 1 ? COLORS.text : COLORS.textDim, whiteSpace: "nowrap" }}>{s}</span>
            </div>
            {i < 3 && <div style={{ width: 20, height: 2, background: step > i + 1 ? COLORS.success : COLORS.border, margin: "0 8px", flexShrink: 0, transition: "background .3s" }} />}
          </div>
        ))}
      </div>
      <div className="card">
        {step === 1 && (
          <div className="slide-in">
            <div className="form-group">
              <label className="form-label">Emergency Type *</label>
              <select value={form.type} onChange={e => upd("type", e.target.value)}>
                <option value="">Select emergency type...</option>
                {EMERGENCY_TYPES.map(t => <option key={t}>{t}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Detailed Description *</label>
              <textarea rows={5} placeholder="Describe the incident in detail. Include: what happened, number of people involved, any suspects' description, vehicle numbers, etc." value={form.description} onChange={e => upd("description", e.target.value)} />
              <div className="form-hint">{form.description.length}/500 characters — Be as specific as possible</div>
            </div>
            <div className="form-group">
              <label className="form-label">Emergency Level *</label>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 10 }}>
                {[{ l: "Low", desc: "Non-urgent situation", icon: "info-circle", color: COLORS.success }, { l: "Medium", desc: "Attention needed soon", icon: "alert-circle", color: COLORS.info }, { l: "High", desc: "Urgent — respond quickly", icon: "alert-triangle", color: COLORS.warning }, { l: "Critical", desc: "Life threatening — immediate", icon: "flame", color: COLORS.danger }].map(({ l, desc, icon, color }) => (
                  <button key={l} onClick={() => upd("level", l)} style={{ background: form.level === l ? `${color}18` : COLORS.bgPanel, border: `2px solid ${form.level === l ? color : COLORS.border}`, borderRadius: 10, padding: "12px", textAlign: "left", cursor: "pointer", transition: "all .2s" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                      <Icon name={icon} size={16} color={color} />
                      <span style={{ fontSize: 13, fontWeight: 700, color }}>{l}</span>
                    </div>
                    <div style={{ fontSize: 11, color: COLORS.textMuted }}>{desc}</div>
                  </button>
                ))}
              </div>
            </div>
            <button className="btn-primary" style={{ width: "100%", padding: 12, borderRadius: 10 }} onClick={() => setStep(2)} disabled={!form.type || !form.description || !form.level}>Next: Location →</button>
          </div>
        )}
        {step === 2 && (
          <div className="slide-in">
            <div className="form-group">
              <label className="form-label">Location Description *</label>
              <input placeholder="e.g. Near Kimironko Market, KG 15 Ave, Kigali" value={form.location} onChange={e => upd("location", e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Live GPS Location</label>
              <div style={{ background: COLORS.bgPanel, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: "12px 14px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <Icon name="map-pin" size={16} color={COLORS.primary} />
                  <span style={{ fontSize: 13 }}>Lat: {form.lat.toFixed(4)}, Lng: {form.lng.toFixed(4)}</span>
                </div>
                <button className="btn-primary" style={{ padding: "6px 12px", fontSize: 12, borderRadius: 6 }} onClick={() => { upd("lat", -1.9441 + (Math.random() - 0.5) * 0.05); upd("lng", 30.0619 + (Math.random() - 0.5) * 0.05); alert("📍 GPS location captured!"); }}>
                  <Icon name="current-location" size={13} /> Capture
                </button>
              </div>
            </div>
            {/* Fake Map */}
            <div className="map-placeholder" style={{ marginBottom: 18, height: 200 }}>
              <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)" }}>
                <div className="map-dot ring-animation" />
              </div>
              <div style={{ position: "absolute", bottom: 12, left: "50%", transform: "translateX(-50%)", background: "rgba(0,0,0,.7)", padding: "4px 12px", borderRadius: 20, fontSize: 11, color: COLORS.textMuted }}>
                Kigali, Rwanda
              </div>
              {[{ top: "30%", left: "35%" }, { top: "60%", left: "65%" }, { top: "45%", left: "20%" }].map((pos, i) => (
                <div key={i} style={{ position: "absolute", ...pos, width: 8, height: 8, borderRadius: "50%", background: "#3B82F6", opacity: .6 }} />
              ))}
            </div>
            <div className="form-group">
              <label className="form-label">Date & Time of Incident *</label>
              <input type="datetime-local" value={form.date} onChange={e => upd("date", e.target.value)} />
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button className="btn-secondary" style={{ flex: 1, padding: 12, borderRadius: 10 }} onClick={() => setStep(1)}>← Back</button>
              <button className="btn-primary" style={{ flex: 2, padding: 12, borderRadius: 10 }} onClick={() => setStep(3)} disabled={!form.location}>Next: Evidence →</button>
            </div>
          </div>
        )}
        {step === 3 && (
          <div className="slide-in">
            <div style={{ marginBottom: 20 }}>
              <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 6 }}>Upload Evidence</h3>
              <p style={{ fontSize: 13, color: COLORS.textMuted }}>Optional but recommended. Attach photos, videos, or audio recordings.</p>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 12, marginBottom: 20 }}>
              {[{ t: "Photo", i: "photo", ext: "JPG/PNG" }, { t: "Video", i: "video", ext: "MP4/MOV" }, { t: "Audio", i: "microphone", ext: "MP3/WAV" }].map(({ t, i, ext }) => (
                <button key={t} onClick={() => { addEvidence(t); }} style={{ background: COLORS.bgPanel, border: `2px dashed ${COLORS.border}`, borderRadius: 12, padding: "24px 12px", display: "flex", flexDirection: "column", alignItems: "center", gap: 8, cursor: "pointer", transition: "border-color .2s" }}
                  onMouseEnter={e => e.currentTarget.style.borderColor = COLORS.primary}
                  onMouseLeave={e => e.currentTarget.style.borderColor = COLORS.border}>
                  <Icon name={i} size={28} color={COLORS.primary} />
                  <span style={{ fontSize: 13, fontWeight: 600 }}>Add {t}</span>
                  <span style={{ fontSize: 11, color: COLORS.textDim }}>{ext}</span>
                </button>
              ))}
            </div>
            {form.evidence.length > 0 && (
              <div>
                <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 10 }}>{form.evidence.length} file(s) attached</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
                  {form.evidence.map((ev, i) => (
                    <div key={i} className="evidence-thumb" style={{ flexDirection: "column", gap: 6, padding: 8 }}>
                      <Icon name={ev.type === "Photo" ? "photo" : ev.type === "Video" ? "video" : "microphone"} size={24} color={COLORS.primary} />
                      <span style={{ fontSize: 9, color: COLORS.textDim, textAlign: "center", wordBreak: "break-all" }}>{ev.name}</span>
                      <button onClick={() => setForm(p => ({ ...p, evidence: p.evidence.filter((_, j) => j !== i) }))} style={{ background: "none", border: "none", color: COLORS.danger, fontSize: 11, cursor: "pointer", padding: 0 }}>Remove</button>
                    </div>
                  ))}
                </div>
              </div>

              <Icon name="lock" size={13} color={COLORS.info} /> Evidence is securely stored and only accessible by authorized officers. Max 50MB per file.
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
              <button className="btn-secondary" style={{ flex: 1, padding: 12, borderRadius: 10 }} onClick={() => setStep(2)}>← Back</button>
              <button className="btn-primary" style={{ flex: 2, padding: 12, borderRadius: 10 }} onClick={() => setStep(4)}>Next: Review →</button>
            </div>
          </div>
        )}
        {step === 4 && (
          <div className="slide-in">
            <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 20 }}>Review Your Report</h3>
            {[["Emergency Type", form.type], ["Emergency Level", form.level], ["Location", form.location], ["Date & Time", form.date.replace("T", " ")], ["Evidence Files", form.evidence.length + " file(s)"]].map(([k, v]) => (
              <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: `1px solid ${COLORS.border}`, fontSize: 13 }}>
                <span style={{ color: COLORS.textMuted }}>{k}</span>
                <span style={{ fontWeight: 600, textAlign: "right", maxWidth: "60%" }}>{v}</span>
              </div>
            ))}
            <div style={{ padding: "10px 0", borderBottom: `1px solid ${COLORS.border}` }}>

          </div>
        )}
      </div>
    </div>

              <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${COLORS.border}`, fontSize: 13 }}>

              </div>
            ))}
            <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
              <button className="btn-success" style={{ flex: 1, padding: "10px" }} onClick={() => { updateStatus(showModal, "Resolved"); setShowModal(null); }}>Resolve</button>

          </div>
        </div>
      ) : null; })()}
    </div>
  );
};

// ── MAIN APP ─────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("home");
  const [user, setUser] = useState(null);
  const [reports, setReports] = useState(INITIAL_REPORTS);
  const [showNotif, setShowNotif] = useState(false);

  return (
    <>
      <style>{CSS}</style>
      <TopBar page={page} setPage={setPage} user={user} notifications={3} setShowNotif={setShowNotif} />
      {showNotif && <NotificationsPanel reports={reports} />}
      {showNotif && <div onClick={() => setShowNotif(false)} style={{ position: "fixed", inset: 0, zIndex: 150 }} />}
      <div onClick={() => showNotif && setShowNotif(false)}>
        {page === "home" && <HomePage setPage={setPage} />}
        {page === "login" && <LoginPage setPage={setPage} setUser={setUser} />}
        {page === "register" && <RegisterPage setPage={setPage} />}
        {page === "report" && <ReportPage setPage={setPage} reports={reports} setReports={setReports} user={user} />}
        {page === "track" && <TrackPage reports={reports} user={user} />}
        {page === "adminDash" && <AdminDashboard reports={reports} setReports={setReports} />}
        {page === "policeDash" && <PoliceDashboard reports={reports} setReports={setReports} />}
        {page === "hospitalDash" && <HospitalDashboard reports={reports} />}
        {page === "contact" && <ContactPage />}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
